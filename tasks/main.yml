---
- name: nginx | Fail if distro is not supported
  ansible.builtin.fail:
    msg: "Distribution '{{ ansible_facts['distribution'] }}' is not supported. Supported: Debian, Ubuntu"
  when: ansible_facts['distribution'] not in ['Debian', 'Ubuntu']

- name: nginx | Fail if redirect and default vhost conflict on the same port
  ansible.builtin.fail:
    msg: >-
      nginx_redirect_http_to_https and nginx_default_vhost_enabled both listen on port
      {{ nginx_redirect_http_port }} — this will cause a duplicate default_server conflict.
      Either set nginx_default_vhost_enabled: false, change nginx_default_vhost_port,
      or set nginx_redirect_http_to_https: false.
  when:
    - nginx_redirect_http_to_https | bool
    - nginx_default_vhost_enabled | bool
    - nginx_redirect_http_port | int == nginx_default_vhost_port | int

- name: nginx | Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true
    lock_timeout: 300

- name: nginx | Ensure document root directory exists
  ansible.builtin.file:
    path: "{{ nginx_default_vhost_root }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: nginx | Deploy logrotate configuration
  ansible.builtin.template:
    src: logrotate.j2
    dest: /etc/logrotate.d/nginx
    owner: root
    group: root
    mode: "0644"

- name: nginx | Deploy nginx.conf
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx
  when: nginx_config_deploy | bool

- name: nginx | Ensure sites-available directory exists
  ansible.builtin.file:
    path: /etc/nginx/sites-available
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: nginx | Ensure sites-enabled directory exists
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: nginx | Deploy default virtual host
  ansible.builtin.template:
    src: vhost.conf.j2
    dest: /etc/nginx/sites-available/default
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx
  when: nginx_default_vhost_enabled | bool

- name: nginx | Enable default virtual host
  ansible.builtin.file:
    src: /etc/nginx/sites-available/default
    dest: /etc/nginx/sites-enabled/default
    state: link
  notify: Reload nginx
  when: nginx_default_vhost_enabled | bool

- name: nginx | Disable default virtual host
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx
  when: not nginx_default_vhost_enabled | bool

- name: nginx | Ensure default index.html exists
  ansible.builtin.copy:
    dest: "{{ nginx_default_vhost_root }}/index.html"
    content: |
      <!DOCTYPE html>
      <html>
      <head><title>Welcome</title></head>
      <body><h1>Welcome</h1></body>
      </html>
    owner: root
    group: root
    mode: "0644"
    force: false
  when: nginx_default_vhost_enabled | bool

- name: nginx | Deploy HTTP to HTTPS redirect vhost
  ansible.builtin.template:
    src: redirect.conf.j2
    dest: /etc/nginx/sites-available/redirect.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx
  when: nginx_redirect_http_to_https | bool

- name: nginx | Enable HTTP to HTTPS redirect vhost
  ansible.builtin.file:
    src: /etc/nginx/sites-available/redirect.conf
    dest: /etc/nginx/sites-enabled/redirect.conf
    state: link
  notify: Reload nginx
  when: nginx_redirect_http_to_https | bool

- name: nginx | Remove HTTP to HTTPS redirect vhost
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/nginx/sites-enabled/redirect.conf
    - /etc/nginx/sites-available/redirect.conf
  notify: Reload nginx
  when: not nginx_redirect_http_to_https | bool

- name: nginx | Validate nginx configuration
  ansible.builtin.command: nginx -t
  changed_when: false

- name: nginx | Enable and start service
  ansible.builtin.systemd:
    name: "{{ nginx_service_name }}"
    enabled: "{{ nginx_service_enabled }}"
    state: "{{ nginx_service_state }}"
    daemon_reload: true

- name: nginx | Display access information
  ansible.builtin.debug:
    msg: |
      nginx installed successfully!

      Listening on: http://{{ ansible_facts['default_ipv4']['address'] | default(inventory_hostname) }}:{{ nginx_default_vhost_port }}
      Document root: {{ nginx_default_vhost_root }}

      CLI commands:
        systemctl start nginx
        systemctl stop nginx
        systemctl restart nginx
        nginx -t               (test config)
